name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_SITE_URL: https://www.mbjewellers.in
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mb_jewellers?schema=public
  LEAD_STORAGE_MODE: json
  ADMIN_EMAIL: ci@example.com
  ADMIN_PASSWORD: ci-build-password
  ADMIN_SESSION_SECRET: ci-build-secret-minimum-32-characters-long

jobs:
  quality:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run format:check

  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Reported for visibility but non-blocking: the only outstanding high-severity
      # advisory is in Next.js (GHSA-8h8q-6873-q5fj) and has no published stable fix
      # for the 16.2.x line yet. Re-enable blocking once next >= 16.2.7 ships.
      - name: npm audit (report high severity)
        continue-on-error: true
        run: npm audit --audit-level=high
      # Hard gate: fail only on critical vulnerabilities (none currently).
      - name: npm audit (fail on critical)
        run: npm audit --audit-level=critical

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [quality]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run build
      - run: npm run verify:build
